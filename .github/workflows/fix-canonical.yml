 name: Fix Canonical
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sed -i 's|\.com/\([^"]*\)\.html"|\.com/\1"|g' *.html
      - run: |
          git config user.email "bot@fix.com"
          git config user.name "FixBot"
          git add *.html
          git diff --staged --quiet || git commit -m "fix canonical"
          git push
