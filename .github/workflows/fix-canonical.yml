 name: Fix Canonical Tags
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix canonical URLs
        run: |
          python3 -c "
          import os, re, glob
          files = glob.glob('*.html')
          fixed = 0
          for f in files:
              content = open(f, encoding='utf-8').read()
              new = re.sub(
                  r'<link rel=\"canonical\" href=\"https://www\.abcdclean\.com/([^\"]+)\.html\">',
                  r'<link rel=\"canonical\" href=\"https://www.abcdclean.com/\1\">',
                  content
              )
              if content != new:
                  open(f, 'w', encoding='utf-8').write(new)
                  fixed += 1
                  print(f'Fixed: {f}')
          print(f'Total fixed: {fixed}')
          "

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add *.html
          git diff --staged --quiet || git commit -m "fix: canonical URLs - remove .html extension"
          git push
